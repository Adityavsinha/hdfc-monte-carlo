env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy scipy matplotlib openpyxl pyarrow
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client gspread

      - name: Setup Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDS }}' > google_creds.json
          echo '${{ secrets.GOOGLE_CLIENT_SECRET }}' > client_secret.json

      - name: Create config
        run: |
          python - <<'PYEOF'
          import json
          config = {
            "drive_folder_id": "${{ secrets.DRIVE_FOLDER_ID }}",
            "spreadsheet_id": "${{ secrets.SPREADSHEET_ID }}",
            "ticker": "HDFCBANK.NS",
            "simulations": 10000,
            "horizon_days": 252,
            "auto_schedule": True
          }
          with open("config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("config.json created successfully")
          PYEOF

      - name: Verify files exist
        run: |
          echo "Files in directory:"
          ls -la
          echo "Checking key files:"
          test -f run_auto.py && echo "run_auto.py OK" || echo "run_auto.py MISSING"
          test -f config.json && echo "config.json OK" || echo "config.json MISSING"
          test -f google_creds.json && echo "google_creds.json OK" || echo "google_creds.json MISSING"

      - name: Run Monte Carlo simulation
        run: python run_auto.py

      - name: Prepare GitHub Pages
        run: |
          mkdir -p docs
          cp outputs/hdfc_dashboard.html docs/index.html
          echo "Last updated: $(date)" > docs/last_updated.txt

       - name: Commit and push updated dashboard
        run: |
          git config --global user.name "HDFC Bot"
          git config --global user.email "bot@hdfc-monte-carlo.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git pull --rebase origin main
          git add docs/ outputs/
          git diff --staged --quiet || git commit -m "Auto update: $(date +'%d %b %Y %H:%M IST')"
          git push origin HEAD:main

    
