name: QuantEdge Analytics — Daily Pipeline

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  quant_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scipy statsmodels arch requests
          pip install matplotlib openpyxl pyarrow
          echo "✅ All dependencies installed"

      - name: Verify scripts exist
        run: |
          echo "Files in scripts/:"
          ls -la scripts/ 2>/dev/null || echo "scripts/ folder not found!"
          test -f scripts/run_pipeline.py  && echo "✅ run_pipeline.py found"  || echo "❌ run_pipeline.py MISSING - upload it first!"
          test -f scripts/quant_engine.py  && echo "✅ quant_engine.py found"  || echo "❌ quant_engine.py MISSING"
          test -f scripts/data_ingestion.py && echo "✅ data_ingestion.py found" || echo "❌ data_ingestion.py MISSING"
          test -f scripts/config.py        && echo "✅ config.py found"         || echo "❌ config.py MISSING"

      - name: Run QuantEdge daily pipeline
        working-directory: scripts
        run: |
          mkdir -p ../docs
          python run_pipeline.py

      - name: Verify outputs
        run: |
          echo "Output files:"
          ls -lh docs/*.json 2>/dev/null || echo "No JSON files in docs/"
          test -f docs/metrics.json  && echo "✅ metrics.json"  || echo "❌ metrics.json MISSING"
          test -f docs/summary.json  && echo "✅ summary.json"  || echo "❌ summary.json MISSING"
          test -f docs/charts.json   && echo "✅ charts.json"   || echo "❌ charts.json MISSING"

      - name: Clean up
        run: |
          find . -name "*.log" -not -path "./.git/*" -delete 2>/dev/null || true
          find . -name "__pycache__" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          echo "🧹 Cleanup done"

      - name: Commit and push
        run: |
          git config --global user.name "QuantEdge Bot"
          git config --global user.email "bot@quantedgeanalytics.co.in"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin main
          git checkout main
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "📊 Daily update: $(date +'%d %b %Y %H:%M IST')"
            git push origin main
            echo "✅ Data pushed"
          fi
