name: QuantEdge Analytics — Daily Pipeline

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 6:30 PM IST every weekday
  workflow_dispatch:           # Manual trigger from GitHub

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  quant_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scipy matplotlib openpyxl pyarrow
          pip install statsmodels arch requests
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client
          echo "✅ Dependencies installed"

      - name: Verify structure
        run: |
          ls -la scripts/
          python -c "import yfinance, statsmodels, arch; print('All imports OK')"

      - name: Run QuantEdge daily pipeline
        working-directory: scripts
        run: |
          python run_pipeline.py

      - name: Verify outputs
        run: |
          echo "Output files:"
          ls -lh docs/*.json 2>/dev/null || echo "No JSON files found"
          test -f docs/metrics.json  && echo "✅ metrics.json OK"  || echo "❌ metrics.json MISSING"
          test -f docs/summary.json  && echo "✅ summary.json OK"  || echo "❌ summary.json MISSING"
          test -f docs/charts.json   && echo "✅ charts.json OK"   || echo "❌ charts.json MISSING"

      - name: Clean up old outputs (keep repo small)
        run: |
          # Remove any large files not needed in git
          find . -name "*.log" -not -path "./.git/*" -delete
          find . -name "__pycache__" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          echo "🧹 Cleanup done"

      - name: Commit and push updated data
        run: |
          git config --global user.name "QuantEdge Bot"
          git config --global user.email "bot@quantedgeanalytics.co.in"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add docs/
          git stash
          git fetch origin main
          git checkout main
          git stash pop
          git add docs/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "📊 Daily update: $(date +'%d %b %Y %H:%M IST')"
          git push origin main
          echo "✅ Data pushed to GitHub Pages"
